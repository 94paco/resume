<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>陳柏銨｜履歷</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:"Segoe UI", sans-serif;
    display:flex;
    background:#eaeef3;
}

/* ===== 左側 ===== */
.sidebar{
    width:35%;
    background:linear-gradient(160deg,#2f3b52,#1c2536);
    color:white;
    padding:40px 30px;
    box-sizing:border-box;
    text-align:center;
}

.profile{
    width:150px;
    height:150px;
    border-radius:50%;
    border:6px solid rgba(255,255,255,0.3);
    object-fit:cover;
    margin-bottom:15px;
}

.name{
    font-size:28px;
    font-weight:bold;
}

.tag{
    display:inline-block;
    margin:8px 5px;
    padding:5px 12px;
    background:rgba(255,255,255,0.15);
    border-radius:20px;
    font-size:12px;
}

.line{
    height:1px;
    background:rgba(255,255,255,0.2);
    margin:25px 0;
}

.info{
    text-align:left;
    font-size:14px;
}

.info p{
    margin:12px 0;
}

.info i{
    margin-right:10px;
    width:20px;
}

/* 技能 */
.skill{
    text-align:left;
}

.skill-bar{
    margin:10px 0;
}

.bar{
    height:6px;
    background:rgba(255,255,255,0.2);
    border-radius:10px;
    overflow:hidden;
    margin-top:5px;
}

.bar div{
    height:100%;
    background:linear-gradient(90deg,#6dd5fa,#3498db);
}

/* 興趣 */
.interest{
    text-align:left;
    font-size:14px;
}

.interest i{
    margin-right:10px;
    width:20px;
}

/* 音樂按鈕 */
.music{
    margin-top:15px;
    text-align:left;
}

.music button{
    margin-top:10px;
    padding:8px 16px;
    border:none;
    border-radius:20px;
    background:linear-gradient(45deg,#6dd5fa,#3498db);
    color:white;
    font-size:13px;
    cursor:pointer;
    transition:0.3s;
}

.music button:hover{
    transform:scale(1.05);
}

/* ===== 右側 ===== */
.main{
    width:65%;
    background:#f9fafc;
    padding:50px;
    clip-path: polygon(8% 0, 100% 0, 100% 100%, 0% 100%);
}

.section{
    background:white;
    padding:25px;
    border-radius:12px;
    margin-bottom:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.section h2{
    display:inline-block;
    background:linear-gradient(45deg,#3498db,#6dd5fa);
    color:white;
    padding:6px 18px;
    border-radius:20px;
    font-size:15px;
}

.item{
    margin-top:15px;
    padding-left:10px;
    border-left:3px solid #3498db;
}

.time{
    font-size:13px;
    color:#888;
}

.title{
    font-weight:bold;
    margin:5px 0;
}

.desc{
    font-size:14px;
    color:#555;
}
</style>
</head>

<body>

<!-- 左側 -->
<div class="sidebar">

<img src="me.jpg" class="profile">

<div class="name">陳柏銨</div>

<div>
<span class="tag">台灣</span>
<span class="tag">大學生</span>
<span class="tag">114022017</span>
</div>

<div class="line"></div>

<div class="music">
<h3>背景音樂</h3>
<button id="musicBtn" onclick="toggleMusic()">
  <i class="fa-solid fa-volume-xmark"></i> 開啟聲音
</button>

<audio id="bgm" autoplay loop muted>
  <source src="MUSIC.mp3" type="audio/mpeg">
</audio>
</div>

<div class="line"></div>

<div class="info">
<p><i class="fa-solid fa-phone"></i>0912-345-678</p>
<p><i class="fa-solid fa-envelope"></i>114022017@live.asia.edu.tw</p>
<p><i class="fa-solid fa-location-dot"></i>台灣</p>
</div>

<div class="line"></div>

<div class="skill">
<h3>技能</h3>

<div class="skill-bar">
<span>HTML / CSS</span>
<div class="bar"><div style="width:80%"></div></div>
</div>

<div class="skill-bar">
<span>JavaScript</span>
<div class="bar"><div style="width:70%"></div></div>
</div>

<div class="skill-bar">
<span>Python</span>
<div class="bar"><div style="width:65%"></div></div>
</div>
</div>

<div class="line"></div>

<div class="interest">
<h3>興趣</h3>
<p><i class="fa-solid fa-chess"></i>桌遊</p>
<p><i class="fa-solid fa-film"></i>電影</p>
</div>

</div>

<!-- 右側 -->
<div class="main">

<div class="section">
<h2>教育經歷</h2>

<div class="item">
<div class="time">2024 - 至今</div>
<div class="title">亞洲大學｜人工智慧學系</div>
<div class="desc">主修人工智慧相關課程</div>
</div>

<div class="item">
<div class="time">2021 - 2024</div>
<div class="title">南山高中</div>
<div class="desc">普通科</div>
</div>

</div>

<div class="section">
<h2>比賽經歷</h2>

<div class="item">
<div class="time">2024</div>
<div class="title">網頁設計課程專案</div>
<div class="desc">製作個人履歷網站</div>
</div>

<div class="item">
<div class="time">2025</div>
<div class="title">程式設計競賽</div>
</div>

</div>

</div>

<script>
const music = document.getElementById("bgm");
const btn = document.getElementById("musicBtn");

function toggleMusic(){
    if(music.muted){
        music.muted = false;
        music.play();
        btn.innerHTML = '<i class="fa-solid fa-volume-high"></i> 靜音';
    }else{
        music.muted = true;
        btn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i> 開啟聲音';
    }
}
</script>

</body>
</html>
